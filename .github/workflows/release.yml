name: Release

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.x
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm to latest
        run: |
          npm -v
          npm config set prefix ~/.local
          export PATH="$HOME/.local/bin:$PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          npm install -g npm@latest np
          hash -r
          npm -v
      - name: Enable Corepack
        run: corepack enable
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Run tests
        run: pnpm test
      - name: Build package
        run: pnpm build
      - name: Check bundle size
        run: pnpm size
      - name: Verify publish artifacts
        run: npm pack
      - name: Verify package exports
        run: npx publint --pack npm
      - name: Check types compatibility
        run: npx attw --pack . --profile node16
      - name: Publish to NPM
        run: |
          npm -v
          ls .npmrc || echo "no .npmrc"
          # Determine tag from release (beta, alpha, etc.)
          TAG="latest"
          if [[ "${{ github.event.release.prerelease }}" == "true" ]]; then
            TAG="next"
          fi

          echo "Publishing with tag: $TAG"
          npm publish --tag $TAG --access public --provenance
